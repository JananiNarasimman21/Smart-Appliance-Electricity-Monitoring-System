<!DOCTYPE html>

<html>

<head>
<title>Select Appliance</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#67d1c5,#7ea6f5);
margin:0;
padding:0;
}

.container{
text-align:center;
padding:30px;
}

h1{
font-size:40px;
margin-top:20px;
color:black;
}

/* remove underline */
a{
text-decoration:none;
color:inherit;
}

.grid{
display:grid;
grid-template-columns:repeat(3,260px);
gap:40px;
justify-content:center;
margin-top:50px;
}

.card{
background:white;
border-radius:18px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 25px #00e6ff;
background:#f5fbff;
}

.card img{
width:120px;
height:120px;
object-fit:contain;
}

.card h3{
margin-top:15px;
font-size:22px;
color:#333;
}

</style>

</head>

<body>

<div class="container">

<h1>⚡ Select Appliance</h1>

<div class="grid">

<a href="/datatype/Appliance1">
<div class="card">
<img src="/static/images/geyser.png">
<h3>Geyser</h3>
</div>
</a>

<a href="/datatype/Appliance2">
<div class="card">
<img src="/static/images/fridge.png">
<h3>Fridge</h3>
</div>
</a>

<a href="/datatype/Appliance3">
<div class="card">
<img src="/static/images/microwave.png">
<h3>Microwave</h3>
</div>
</a>

<a href="/datatype/Appliance4">
<div class="card">
<img src="/static/images/ac.png">
<h3>Air Conditioner</h3>
</div>
</a>

<a href="/datatype/Appliance5">
<div class="card">
<img src="/static/images/washing_machine.png">
<h3>Washing Machine</h3>
</div>
</a>

<a href="/datatype/Appliance6">
<div class="card">
<img src="/static/images/tv.png">
<h3>Television</h3>
</div>
</a>

<a href="/datatype/Appliance7">
<div class="card">
<img src="/static/images/purifier.png">
<h3>Water Purifier</h3>
</div>
</a>

<a href="/datatype/Appliance8">
<div class="card">
<img src="/static/images/kettle.png">
<h3>Electric Kettle</h3>
</div>
</a>

<a href="/datatype/Appliance9">
<div class="card">
<img src="/static/images/laptop.png">
<h3>Laptop Charger</h3>
</div>
</a>

</div>

</div>

</body>

</html>
