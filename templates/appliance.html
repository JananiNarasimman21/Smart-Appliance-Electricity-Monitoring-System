<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Select Appliance</title>
<link rel="stylesheet" href="/static/voice-assistant.css">

<style>
body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
margin: 0;
padding: 0;
color: white;
}

.container {
text-align: center;
padding: 24px;
max-width: 1100px;
margin: 0 auto;
}

h1 {
font-size: 36px;
margin-top: 20px;
}

a {
text-decoration: none;
color: inherit;
}

.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 20px;
margin-top: 32px;
}

.card {
background: linear-gradient(135deg,#00c6ff,#0072ff);
border-radius: 18px;
padding: 20px;
box-shadow: 0 10px 25px rgba(0,0,0,0.4);
transition: 0.3s;
cursor: pointer;
color: white;
min-height: 210px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
}

.card:hover {
transform: translateY(-8px) scale(1.02);
box-shadow: 0 0 25px #00e6ff;
}

.card img {
width: 95px;
height: 95px;
object-fit: contain;
background: rgba(255,255,255,0.2);
padding: 12px;
border-radius: 12px;
}

.card h3 {
margin-top: 14px;
font-size: 20px;
}

@media (max-width: 700px) {
.container { padding: 16px; }
h1 { font-size: 28px; }
.grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
<h1>Select Appliance</h1>

<div class="grid">
<a href="/realtime?appliance=Appliance1"><div class="card"><img src="/static/images/geyser.png" alt="Geyser"><h3>Geyser</h3></div></a>
<a href="/realtime?appliance=Appliance2"><div class="card"><img src="/static/images/fridge.png" alt="Fridge"><h3>Fridge</h3></div></a>
<a href="/realtime?appliance=Appliance3"><div class="card"><img src="/static/images/microwave.png" alt="Microwave"><h3>Microwave</h3></div></a>
<a href="/realtime?appliance=Appliance4"><div class="card"><img src="/static/images/ac.png" alt="Air Conditioner"><h3>Air Conditioner</h3></div></a>
<a href="/realtime?appliance=Appliance5"><div class="card"><img src="/static/images/washing_machine.png" alt="Washing Machine"><h3>Washing Machine</h3></div></a>
<a href="/realtime?appliance=Appliance6"><div class="card"><img src="/static/images/tv.png" alt="Television"><h3>Television</h3></div></a>
<a href="/realtime?appliance=Appliance7"><div class="card"><img src="/static/images/purifier.png" alt="Water Purifier"><h3>Water Purifier</h3></div></a>
<a href="/realtime?appliance=Appliance8"><div class="card"><img src="/static/images/kettle.png" alt="Electric Kettle"><h3>Electric Kettle</h3></div></a>
<a href="/realtime?appliance=Appliance9"><div class="card"><img src="/static/images/laptop.png" alt="Laptop Charger"><h3>Laptop Charger</h3></div></a>
</div>
</div>

<script src="/static/voice-assistant.js" defer></script>
</body>
</html>
