<!DOCTYPE html>
<html>
<head>
    <title>Data View</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:0;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 25px;
            background:#2c3e50;
            color:white;
        }

        .btn{
            padding:10px 15px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            color:white;
            margin-left:10px;
        }

        .csv-btn{ background:#27ae60; }
        .pdf-btn{ background:#e67e22; }
        .img-btn{ background:#8e44ad; }

        .container{
            display:flex;
            height:calc(100vh - 70px);
        }

        .table-container{
            width:60%;
            overflow-y:auto;
            padding:20px;
        }

        table{
            width:100%;
            border-collapse: collapse;
            background:white;
        }

        th, td{
            padding:10px;
            border:1px solid #ccc;
            text-align:center;
        }

        th{
            background:#007bff;
            color:white;
            position: sticky;
            top: 0;
        }

        .graph-container{
            width:40%;
            padding:20px;
        }

        canvas{
            background:white;
            padding:15px;
            border-radius:10px;
            height:400px !important;
        }

        /* POPUP */
        .popup{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
            display:none;
            z-index:999;
        }

        .popup button{
            margin-top:10px;
            padding:5px 10px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>{{ appliance }} - {{ dtype }} Data</h2>

    <div>
        <a href="/download/{{ appliance }}/{{ dtype }}">
            <button class="btn csv-btn">
                <i class="fas fa-file-csv"></i> CSV
            </button>
        </a>

        <form action="/download_pdf" method="POST" style="display:inline;">
            <input type="hidden" name="power" value="N/A">
            <input type="hidden" name="energy" value="{{ rows[-1]['cost'] }}">
            <input type="hidden" name="cost" value="{{ rows[-1]['cost'] }}">
            <input type="hidden" name="month_cost" value="{{ rows[-1]['cost'] }}">
            <button class="btn pdf-btn">
                <i class="fas fa-file-pdf"></i> PDF
            </button>
        </form>

        <button class="btn img-btn" onclick="downloadGraph()">
            <i class="fas fa-image"></i> Graph
        </button>
    </div>
</div>

<div class="container">

{% if rows %}

<!-- TABLE -->
<div class="table-container">
    <table>
        <tr>
            {% for key in rows[0].keys() %}
                <th>{{ key }}</th>
            {% endfor %}
        </tr>

        {% for row in rows %}
        <tr>
            {% for value in row.values() %}
                <td>{{ value }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>
</div>

<!-- GRAPH -->
<div class="graph-container">
    <canvas id="chart"></canvas>
</div>

{% else %}
<h3 style="padding:20px;">No data available</h3>
{% endif %}

</div>

<!-- POPUP -->
<div id="popup" class="popup">
    <h3>Energy Details</h3>
    <p id="popupContent"></p>
    <button onclick="closePopup()">Close</button>
</div>

<script>

const rows = {{ rows | tojson }};
const dtype = "{{ dtype }}";

// 🔍 detect energy column
const energyKey = Object.keys(rows[0]).find(k => k.toLowerCase().includes("kwh"));

const labels = [];
const energyData = [];
const costData = [];

// ✅ HANDLE DAILY + MONTHLY
rows.forEach(row => {

    let label = "";

    if (row.year && row.month) {
        label = row.year + "-" + String(row.month).padStart(2, '0');
    } else {
        label = row.date || row.Date || row.timestamp;
    }

    labels.push(label);

    energyData.push(parseFloat(row[energyKey]) || 0);
    costData.push(parseFloat(row.cost) || 0);
});

const ctx = document.getElementById('chart').getContext('2d');

// ✅ CREATE CHART
const chart = new Chart(ctx, {
    type: dtype === "monthly" ? "bar" : "line",
    data: {
        labels: labels,
        datasets: [
            {
                label: "Energy (kWh)",
                data: energyData,
                borderColor: "#1f77b4",
                backgroundColor: "rgba(31,119,180,0.6)",
                borderWidth: 3,
                tension: 0.4,
                fill: true,
                pointRadius: 6,
                pointBackgroundColor: "#1f77b4"
            },
            {
                label: "Cost (₹)",
                data: costData,
                borderColor: "#d62728",
                backgroundColor: "rgba(214,39,40,0.6)",
                borderWidth: 3,
                tension: 0.4,
                fill: true,
                pointRadius: 6,
                pointBackgroundColor: "#d62728"
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,

        animation: {
            duration: 1000
        },

        interaction: {
            mode: 'nearest',
            intersect: true
        },

        plugins: {
            tooltip: {
                enabled: true
            }
        },

        scales: {
            x: {
                ticks: {
                    color: "#000",
                    font: { weight: "bold" }
                }
            },
            y: {
                ticks: {
                    color: "#000",
                    font: { weight: "bold" }
                }
            }
        },

        // ✅ CLICK POPUP
        onClick: (event) => {

            const points = chart.getElementsAtEventForMode(
                event,
                'nearest',
                { intersect: true },
                true
            );

            if (points.length > 0) {
                const index = points[0].index;

                const text = `
                    <b>Date:</b> ${labels[index]} <br>
                    <b>Energy:</b> ${energyData[index]} kWh <br>
                    <b>Cost:</b> ₹${costData[index]}
                `;

                document.getElementById("popupContent").innerHTML = text;
                document.getElementById("popup").style.display = "block";
            }
        }
    }
});

// CLOSE POPUP
function closePopup(){
    document.getElementById("popup").style.display = "none";
}

// EXPORT GRAPH
function downloadGraph(){
    const link = document.createElement('a');
    link.download = 'graph.png';
    link.href = chart.toBase64Image();
    link.click();
}

</script>

</body>
</html>
