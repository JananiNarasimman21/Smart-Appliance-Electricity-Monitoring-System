<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Real-Time Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/voice-assistant.css">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        h1 { text-align: center; padding: 14px; }
        .container { max-width: 920px; margin: auto; padding: 18px; }
        .form-box, .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 16px; }
        select, input { width: 100%; box-sizing: border-box; padding: 10px; margin: 8px 0; border: 1px solid #d0d7de; border-radius: 8px; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        button { padding: 10px 18px; border: none; border-radius: 8px; color: white; cursor: pointer; }
        .primary { background: #0d6efd; }
        .danger { background: #d93025; }
        .secondary { background: #6c757d; }
        .metrics { background: linear-gradient(120deg,#1d976c,#93f9b9); color: #0a1f16; }
        .accuracy { background: linear-gradient(120deg,#00c6ff,#0072ff); color: white; }
        .top-consumer { background: linear-gradient(120deg,#f7971e,#ffd200); color: #27210a; }
        .hint { color: #555; margin: 4px 0 0 0; }
        #credentials-card { display: none; }
        canvas { background: white; border-radius: 12px; padding: 8px; }
    </style>
</head>
<body>
<h1>Real-Time Monitoring</h1>
<div class="container">
    <div class="form-box">
        <label for="appliance">Select Appliance</label>
        <select id="appliance" aria-label="Select Appliance">
            <option value="">-- Select appliance --</option>
        </select>
        <p class="hint">Select appliance first. Then enter smart plug details.</p>
        <div class="btn-row">
            <button class="secondary" id="go-history" type="button">Open History</button>
        </div>
    </div>

    <div class="form-box" id="credentials-card">
        <p class="hint">Enter Tapo device IP (not backend server IP).</p>
        <input id="ip" placeholder="Smart plug IP address" aria-label="IP Address">
        <input id="email" placeholder="Tapo email" aria-label="Email">
        <input id="password" type="password" placeholder="Tapo password" aria-label="Password">
        <div class="btn-row">
            <button class="primary" id="start-monitoring" type="button">Start</button>
            <button class="danger" id="stop-monitoring" type="button">Stop</button>
        </div>
    </div>

    <div class="card metrics">
        <h3>Appliance: <span id="appliance-name">-</span></h3>
        <h3>Power (W): <span id="power">0</span></h3>
        <h3>Energy Today (kWh): <span id="energy">0</span></h3>
        <h3>Cost Today (Rs): <span id="cost">0</span></h3>
    </div>

    <div class="card accuracy">
        <h3>Accuracy: <span id="accuracy">0</span> %</h3>
    </div>

    <div class="card top-consumer">
        <h3>Top Power Consumer: <span id="top-appliance">-</span></h3>
        <h3>Avg Power (W): <span id="top-avg-power">0</span></h3>
        <h3>Peak Power (W): <span id="top-peak-power">0</span></h3>
    </div>

    <canvas id="chart" height="120"></canvas>
</div>

<script>
let intervalHandle = null;
const labels = [];
const powerData = [];
const applianceSelect = document.getElementById("appliance");
const credentialsCard = document.getElementById("credentials-card");
const applianceNameLabel = document.getElementById("appliance-name");
const ipInput = document.getElementById("ip");
const ctx = document.getElementById("chart").getContext("2d");
const queryAppliance = new URLSearchParams(window.location.search).get("appliance") || "";

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels,
        datasets: [{
            label: "Power (W)",
            data: powerData,
            borderColor: "#0d6efd",
            tension: 0.3,
            fill: false
        }]
    },
    options: { animation: false, responsive: true, scales: { y: { beginAtZero: true } } }
});

function setMonitoringEnabled(enabled) {
    credentialsCard.style.display = enabled ? "block" : "none";
    const selectedName = applianceSelect.options[applianceSelect.selectedIndex]?.text || "-";
    applianceNameLabel.innerText = enabled ? selectedName : "-";
}

function stopMonitoring() {
    if (intervalHandle) {
        clearInterval(intervalHandle);
        intervalHandle = null;
    }
}

function startMonitoring() {
    const appliance = applianceSelect.value;
    const ip = document.getElementById("ip").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!appliance) {
        alert("Please select appliance first.");
        return;
    }
    if (!ip || !email || !password) {
        alert("Please enter IP, email, and password.");
        return;
    }

    stopMonitoring();
    intervalHandle = setInterval(() => {
        fetch("/livepower", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ appliance, ip, email, password })
        })
        .then(async (res) => {
            const raw = await res.text();
            let data;
            try {
                data = JSON.parse(raw);
            } catch (_) {
                throw new Error(raw || `Server returned status ${res.status}`);
            }
            if (!res.ok) {
                throw new Error(data.error || `Server returned status ${res.status}`);
            }
            return data;
        })
        .then(data => {
            document.getElementById("power").innerText = Number(data.power || 0).toFixed(2);
            document.getElementById("energy").innerText = Number(data.energy || 0).toFixed(4);
            document.getElementById("cost").innerText = Number(data.cost || 0).toFixed(2);

            const time = new Date().toLocaleTimeString();
            labels.push(time);
            powerData.push(Number(data.power || 0));
            if (labels.length > 20) {
                labels.shift();
                powerData.shift();
            }
            chart.update();

            fetch("/accuracy_api")
                .then(res => res.json())
                .then(acc => {
                    const value = Number(acc.accuracy || 0).toFixed(2);
                    document.getElementById("accuracy").innerText = value;
                });
        })
        .catch((err) => {
            stopMonitoring();
            alert("Backend error: " + (err?.message || "Unable to connect to backend."));
        });
    }, 3000);
}

function loadAppliances() {
    fetch("/api/appliances")
        .then(res => res.json())
        .then(payload => {
            (payload.appliances || []).forEach(item => {
                const opt = document.createElement("option");
                opt.value = item.id;
                opt.textContent = item.name;
                applianceSelect.appendChild(opt);
            });

            if (queryAppliance) {
                applianceSelect.value = queryAppliance;
            }
            setMonitoringEnabled(Boolean(applianceSelect.value));
        });
}

applianceSelect.addEventListener("change", () => {
    setMonitoringEnabled(Boolean(applianceSelect.value));
    stopMonitoring();
});

document.getElementById("start-monitoring").addEventListener("click", startMonitoring);
document.getElementById("stop-monitoring").addEventListener("click", stopMonitoring);
document.getElementById("go-history").addEventListener("click", () => {
    const appliance = applianceSelect.value;
    if (!appliance) {
        alert("Please select appliance first.");
        return;
    }
    window.location.href = `/history?appliance=${encodeURIComponent(appliance)}`;
});

loadAppliances();
</script>
<script src="/static/voice-assistant.js" defer></script>
</body>
</html>
