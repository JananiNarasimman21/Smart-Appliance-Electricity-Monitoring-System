<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Monitoring</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 15px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .form-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .start { background: #3498db; }
        .stop { background: #e74c3c; }

        .card {
            background: linear-gradient(120deg,#ff9a9e,#fad0c4);
            padding: 20px;
            border-radius: 12px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        canvas {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>⚡ Real-Time Monitoring</h1>

<div class="container">

    <!-- INPUT -->
    <div class="form-box">
        <input id="ip" placeholder="IP Address"><br>
        <input id="email" placeholder="Email"><br>
        <input id="password" type="password" placeholder="Password"><br>

        <button class="start" onclick="start()">Start</button>
        <button class="stop" onclick="stop()">Stop</button>
    </div>

    <!-- VALUES -->
    <div class="card">
        <h3>Power (W): <span id="power">0</span></h3>
        <h3>Energy Today (kWh): <span id="energy">0</span></h3>
        <h3>Cost (₹): <span id="cost">0</span></h3>
    </div>

    <!-- ⚡ ACCURACY -->
    <div class="card" style="background: linear-gradient(120deg,#00c6ff,#0072ff);">
        <h3>⚡ Accuracy: <span id="accuracy">0</span> %</h3>
    </div>

    <!-- GRAPH -->
    <canvas id="chart" height="120"></canvas>

</div>

<script>

let interval;
const labels = [];
const powerData = [];

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Power (W)',
            data: powerData,
            borderColor: 'blue',
            tension: 0.3,
            fill: false
        }]
    },
    options: {
        animation: false,
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});

function start() {

    const ip = document.getElementById("ip").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    interval = setInterval(() => {

        fetch("/livepower", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                ip: ip,
                email: email,
                password: password
            })
        })
        .then(res => res.json())
        .then(data => {

            if(data.error){
                alert(data.error);
                stop();
                return;
            }

            // Update values
            document.getElementById("power").innerText = data.power.toFixed(2);
            document.getElementById("energy").innerText = data.energy.toFixed(4);
            document.getElementById("cost").innerText = data.cost.toFixed(2);

            // Graph update
            const time = new Date().toLocaleTimeString();

            labels.push(time);
            powerData.push(data.power);

            if(labels.length > 20){
                labels.shift();
                powerData.shift();
            }

            chart.update();

            // 🔥 Fetch Accuracy
            fetch("/accuracy_api")
            .then(res => res.json())
            .then(accData => {

                let acc = accData.accuracy;

                document.getElementById("accuracy").innerText = acc;

                // Color indicator
                let accText = document.getElementById("accuracy");

                if(acc >= 95){
                    accText.style.color = "lime";
                } else if(acc >= 80){
                    accText.style.color = "yellow";
                } else {
                    accText.style.color = "red";
                }

            });

        });

    }, 3000);
}

function stop(){
    clearInterval(interval);
}

</script>

</body>
</html>
