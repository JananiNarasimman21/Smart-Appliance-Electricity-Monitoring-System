<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Select Data Type</title>

<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/voice-assistant.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* CONTAINER */
.container{
text-align:center;
margin-top:100px;
}

/* remove underline */
a{
text-decoration:none;
color:inherit;
}

/* OPTION BOX */
.option-box{
width:320px;
margin:20px auto;
padding:25px;
border-radius:15px;
font-size:20px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.3s;
}

/* HOVER EFFECT */
.option-box:hover{
transform:scale(1.07);
box-shadow:0 0 25px #00e6ff;
}

/* DIFFERENT COLORS */
.daily{
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.monthly{
background:linear-gradient(135deg,#00b09b,#96c93d);
}

.realtime{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

</style>

</head>

<body>

<div class="container">

<h1>⚡ Select Data Type</h1>

<a href="/data/{{appliance}}/daily">
<div class="option-box daily">
📅 Daily Electricity Usage
</div>
</a>

<a href="/data/{{appliance}}/monthly">
<div class="option-box monthly">
📊 Monthly Electricity Usage
</div>
</a>

<a href="/realtime">
<div class="option-box realtime">
⚡ Real Time Electricity
</div>
</a>

</div>

</body>
<script src="/static/voice-assistant.js" defer></script>

</html>
