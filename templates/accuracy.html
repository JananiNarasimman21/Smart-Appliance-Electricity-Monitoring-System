<!DOCTYPE html>
<html>
<head>
<title>Auto Accuracy</title>

<style>
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

.box{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
display:inline-block;
box-shadow:0 0 20px #00e6ff;
}

h1{
color:#00e6ff;
}
</style>

</head>

<body>

<div class="box">

<h1>⚡ Auto Accuracy Check</h1>

<p>Tapo Energy: <b>{{tapo}}</b> kWh</p>
<p>Dashboard Energy: <b>{{dashboard}}</b> kWh</p>

<h2>Accuracy: {{accuracy}} %</h2>

</div>

</body>
</html>
